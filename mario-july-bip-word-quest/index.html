<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Mario Word Quest - 7月 BIP</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap");

    :root {
      --kid-letter-font: "Comic Neue", "Comic Sans MS", "Chalkboard SE", "Marker Felt";
      --sky: #6fcfff;
      --sky-deep: #2794d8;
      --cloud: #fff7df;
      --grass: #4fc34f;
      --grass-dark: #228b3b;
      --soil: #a15c2a;
      --brick: #d85a2a;
      --brick-dark: #9e321e;
      --coin: #ffd23f;
      --coin-dark: #c28500;
      --red: #e73b2f;
      --green: #1e9e50;
      --blue: #2075d6;
      --cream: #fff6dc;
      --paper: #fffef8;
      --ink: #1b2430;
      --muted: #5f6673;
      --line: #242424;
      --shadow: 0 8px 0 rgba(35, 51, 66, 0.18);
      --panel-shadow: 0 10px 24px rgba(25, 44, 72, 0.2);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body,
    button,
    input,
    .answer-line,
    .answer-display,
    .letter-tile,
    .letter-button,
    .choice-button {
      font-family: var(--kid-letter-font), "Noto Sans SC", system-ui, sans-serif;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 14%, rgba(255, 255, 255, 0.82) 0 34px, transparent 35px),
        radial-gradient(circle at 18% 13%, rgba(255, 255, 255, 0.82) 0 26px, transparent 27px),
        radial-gradient(circle at 82% 12%, rgba(255, 255, 255, 0.72) 0 40px, transparent 41px),
        linear-gradient(180deg, var(--sky) 0%, #8fe0ff 58%, #84d65d 58%, var(--grass) 100%);
      letter-spacing: 0;
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
    }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: max(14px, env(safe-area-inset-top)) clamp(10px, 2.5vw, 24px) max(18px, env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-badge {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      flex: 0 0 auto;
      border: 3px solid var(--line);
      border-radius: 50%;
      background: var(--red);
      color: white;
      box-shadow: 0 4px 0 var(--brick-dark);
      font-size: 1.45rem;
      line-height: 1;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.65rem, 4.2vw, 3.15rem);
      line-height: 0.95;
      color: #fff8df;
      text-shadow: 0 3px 0 #14213d, 2px 5px 0 rgba(0, 0, 0, 0.18);
      overflow-wrap: anywhere;
    }

    .mini-status {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      color: #10243b;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 6px 10px;
      border: 3px solid var(--line);
      border-radius: 999px;
      background: var(--cream);
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.14);
      font-size: clamp(0.95rem, 2.8vw, 1.15rem);
      white-space: nowrap;
    }

    .music-toggle {
      width: 42px;
      min-width: 42px;
      padding: 0;
      color: #513100;
      background: linear-gradient(180deg, #ffe66b, var(--coin));
      font-size: 1.25rem;
    }

    .music-toggle.is-off {
      color: var(--muted);
      background: rgba(255, 255, 255, 0.74);
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .panel {
      position: relative;
      border: 4px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow), var(--panel-shadow);
      overflow: hidden;
    }

    .panel::before {
      content: "";
      display: block;
      height: 22px;
      background:
        linear-gradient(90deg, transparent 0 18px, rgba(0, 0, 0, 0.18) 18px 21px, transparent 21px 39px),
        linear-gradient(180deg, #f07a38, var(--brick));
      border-bottom: 4px solid var(--line);
    }

    .panel-body {
      padding: clamp(16px, 3.5vw, 28px);
    }

    .start-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(280px, 0.95fr);
      gap: clamp(16px, 3vw, 28px);
      align-items: stretch;
    }

    .scene {
      position: relative;
      min-height: 360px;
      border: 4px solid var(--line);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 16% 18%, #fff 0 26px, transparent 27px),
        radial-gradient(circle at 23% 17%, #fff 0 34px, transparent 35px),
        radial-gradient(circle at 73% 20%, #fff 0 24px, transparent 25px),
        radial-gradient(circle at 80% 19%, #fff 0 38px, transparent 39px),
        linear-gradient(180deg, #8be4ff 0 64%, #68c94f 64% 100%);
      overflow: hidden;
      box-shadow: inset 0 -12px 0 rgba(0, 0, 0, 0.09);
    }

    .scene::before {
      content: "";
      position: absolute;
      left: -6%;
      right: -6%;
      bottom: 40px;
      height: 100px;
      background:
        radial-gradient(ellipse at 18% 100%, #36b34a 0 74px, transparent 75px),
        radial-gradient(ellipse at 44% 100%, #83d65f 0 96px, transparent 97px),
        radial-gradient(ellipse at 72% 100%, #2fa84a 0 84px, transparent 85px);
    }

    .scene::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 54px;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.18) 0 3px, transparent 3px 42px) 0 0 / 42px 100%,
        linear-gradient(180deg, #bd7636, var(--soil));
      border-top: 4px solid var(--line);
    }

    .pipe {
      position: absolute;
      right: 8%;
      bottom: 54px;
      width: 90px;
      height: 102px;
      border: 4px solid var(--line);
      border-bottom: 0;
      background: linear-gradient(90deg, #37b75e 0 32%, #58e07c 32% 62%, #218744 62%);
      border-radius: 6px 6px 0 0;
      z-index: 2;
    }

    .pipe::before {
      content: "";
      position: absolute;
      left: -14px;
      right: -14px;
      top: -25px;
      height: 34px;
      border: 4px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(90deg, #30a653 0 34%, #65e987 34% 65%, #218744 65%);
    }

    .coin-row {
      position: absolute;
      display: flex;
      gap: 12px;
      top: 34%;
      left: 12%;
      transform: translateY(-50%);
      z-index: 3;
    }

    .coin {
      width: 42px;
      height: 42px;
      border: 4px solid var(--line);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff199 0 16%, transparent 17%), var(--coin);
      box-shadow: inset -5px -6px 0 rgba(194, 133, 0, 0.38), 0 5px 0 rgba(0, 0, 0, 0.18);
      animation: coinBob 1.6s ease-in-out infinite;
    }

    .coin:nth-child(2) {
      animation-delay: 0.22s;
    }

    .coin:nth-child(3) {
      animation-delay: 0.44s;
    }

    @keyframes coinBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .question-block {
      position: absolute;
      top: 18%;
      right: 20%;
      display: grid;
      place-items: center;
      width: 68px;
      height: 68px;
      border: 4px solid var(--line);
      border-radius: 6px;
      background: linear-gradient(180deg, #ffe875, #f4a51d);
      color: #8a4700;
      font-size: 2.7rem;
      box-shadow: 0 7px 0 var(--coin-dark);
      z-index: 3;
      animation: blockNudge 1.9s ease-in-out infinite;
    }

    @keyframes blockNudge {
      0%, 88%, 100% { transform: translateY(0); }
      92% { transform: translateY(-8px); }
    }

    .hero-stage {
      position: absolute;
      left: 14%;
      bottom: 53px;
      z-index: 4;
      display: grid;
      place-items: center;
      width: 170px;
      height: 190px;
    }

    .avatar-figure {
      position: relative;
      width: var(--avatar-size, 128px);
      height: calc(var(--avatar-size, 128px) * 1.18);
      filter: drop-shadow(0 10px 0 rgba(0, 0, 0, 0.18));
    }

    .avatar-figure.small {
      --avatar-size: 78px;
    }

    .avatar-figure.play {
      --avatar-size: clamp(96px, 16vw, 144px);
      animation: heroBounce 1.8s ease-in-out infinite;
    }

    .avatar-figure.art {
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .avatar-figure.art.wide {
      width: calc(var(--avatar-size, 128px) * 1.35);
    }

    .character-img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center bottom;
      filter: drop-shadow(0 10px 0 rgba(0, 0, 0, 0.18));
    }

    @keyframes heroBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    .cap {
      position: absolute;
      left: 17%;
      top: 0;
      display: grid;
      place-items: center;
      width: 66%;
      height: 31%;
      border: 4px solid var(--line);
      border-radius: 999px 999px 42% 42%;
      background: var(--cap-color, var(--red));
      color: white;
      font-size: calc(var(--avatar-size, 128px) * 0.28);
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.28);
      z-index: 4;
    }

    .cap::after {
      content: "";
      position: absolute;
      right: -19%;
      bottom: 2%;
      width: 46%;
      height: 24%;
      border: 4px solid var(--line);
      border-left: 0;
      border-radius: 0 999px 999px 0;
      background: var(--cap-color, var(--red));
    }

    .face {
      position: absolute;
      left: 22%;
      top: 22%;
      width: 58%;
      height: 36%;
      border: 4px solid var(--line);
      border-radius: 46% 46% 42% 42%;
      background: #ffd29d;
      z-index: 3;
    }

    .face::before,
    .face::after {
      content: "";
      position: absolute;
      top: 36%;
      width: 10%;
      height: 13%;
      border-radius: 50%;
      background: var(--line);
    }

    .face::before {
      left: 28%;
    }

    .face::after {
      right: 28%;
    }

    .body {
      position: absolute;
      left: 25%;
      bottom: 11%;
      width: 52%;
      height: 42%;
      border: 4px solid var(--line);
      border-radius: 36% 36% 14% 14%;
      background: linear-gradient(90deg, var(--shirt-color, var(--blue)) 0 50%, var(--overalls-color, #174caa) 50%);
      z-index: 2;
    }

    .body::before,
    .body::after {
      content: "";
      position: absolute;
      bottom: -22%;
      width: 34%;
      height: 22%;
      border: 4px solid var(--line);
      border-radius: 8px;
      background: #5b2a1d;
    }

    .body::before {
      left: -5%;
    }

    .body::after {
      right: -5%;
    }

    .start-copy h2,
    .section-title {
      margin: 0 0 12px;
      font-size: clamp(1.55rem, 4.5vw, 2.45rem);
      line-height: 1.05;
      color: #17223b;
    }

    .start-copy p {
      margin: 0 0 18px;
      font-size: clamp(1.1rem, 3.3vw, 1.35rem);
      line-height: 1.35;
      color: var(--muted);
    }

    .form-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: stretch;
    }

    .name-input {
      width: 100%;
      min-height: 56px;
      padding: 8px 12px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: white;
      font-size: clamp(1.3rem, 4.6vw, 1.7rem);
      outline: none;
      box-shadow: inset 0 3px 0 rgba(0, 0, 0, 0.08);
    }

    .name-input:focus {
      border-color: var(--blue);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 52px;
      padding: 10px 16px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: white;
      color: var(--ink);
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.18);
      font-size: clamp(1rem, 3.1vw, 1.22rem);
      transition: transform 140ms ease, box-shadow 140ms ease, filter 140ms ease;
    }

    .btn:hover {
      filter: brightness(1.03);
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.2);
    }

    .btn.primary {
      background: linear-gradient(180deg, #ff6b55, var(--red));
      color: white;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
    }

    .btn.green {
      background: linear-gradient(180deg, #6ce483, var(--green));
      color: white;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
    }

    .btn.blue {
      background: linear-gradient(180deg, #58b8ff, var(--blue));
      color: white;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
    }

    .btn.gold {
      background: linear-gradient(180deg, #ffe66b, var(--coin));
      color: #513100;
    }

    .btn.ghost {
      background: rgba(255, 255, 255, 0.74);
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .choice-card {
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 8px;
      min-height: 168px;
      padding: 12px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, #ffffff, #fff1c2);
      box-shadow: 0 6px 0 rgba(0, 0, 0, 0.16);
      color: var(--ink);
      text-align: center;
      transition: transform 150ms ease, box-shadow 150ms ease;
    }

    .choice-card:hover,
    .choice-card.selected {
      transform: translateY(-4px);
      box-shadow: 0 10px 0 rgba(0, 0, 0, 0.16);
    }

    .choice-card strong {
      display: block;
      font-size: clamp(1.2rem, 3.4vw, 1.5rem);
    }

    .choice-card span {
      font-size: clamp(0.95rem, 2.6vw, 1.08rem);
      color: var(--muted);
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    .option-button {
      min-height: 132px;
      padding: 16px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: 0 6px 0 rgba(0, 0, 0, 0.16);
      text-align: left;
    }

    .option-button strong {
      display: block;
      font-size: clamp(1.45rem, 4vw, 2.05rem);
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .option-button span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: clamp(1rem, 2.8vw, 1.14rem);
      line-height: 1.25;
    }

    .option-button.week-2 {
      background: linear-gradient(180deg, #fff, #fff3c6);
    }

    .option-button.week-3 {
      background: linear-gradient(180deg, #fff, #dff8ff);
    }

    .screen-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .game-shell {
      display: grid;
      grid-template-columns: minmax(280px, 0.86fr) minmax(0, 1.14fr);
      gap: clamp(12px, 2.4vw, 18px);
      align-items: stretch;
    }

    .play-scene {
      min-height: 520px;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .hud .chip {
      min-width: 0;
      justify-content: flex-start;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lifes {
      color: #de2920;
      text-shadow: 0 2px 0 #fff;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .question-panel {
      border: 4px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 254, 248, 0.96);
      box-shadow: var(--shadow);
      padding: clamp(14px, 3vw, 22px);
    }

    .prompt-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .prompt-emoji {
      display: grid;
      place-items: center;
      width: clamp(62px, 16vw, 88px);
      height: clamp(62px, 16vw, 88px);
      border: 3px solid var(--line);
      border-radius: 50%;
      background: #fff2bd;
      font-size: clamp(2rem, 9vw, 3.25rem);
      box-shadow: 0 6px 0 rgba(0, 0, 0, 0.16);
    }

    .prompt-title {
      margin: 0;
      font-size: clamp(1.5rem, 4.8vw, 2.35rem);
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .prompt-sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 3vw, 1.18rem);
      line-height: 1.2;
    }

    .progress-track {
      height: 18px;
      border: 3px solid var(--line);
      border-radius: 999px;
      background: #e8eff8;
      overflow: hidden;
      margin: 0 0 14px;
    }

    .progress-bar {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #38c965, #ffd23f);
      transition: width 250ms ease;
    }

    .answer-display {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 7px;
      min-height: 78px;
      padding: 12px;
      border: 3px dashed #2f3541;
      border-radius: var(--radius);
      background: #fff;
      margin: 12px 0;
    }

    .answer-slot {
      display: inline-grid;
      place-items: center;
      min-width: clamp(28px, 7.4vw, 42px);
      height: clamp(38px, 9vw, 50px);
      padding: 0 4px;
      border-bottom: 4px solid var(--line);
      font-size: clamp(1.4rem, 6vw, 2rem);
      line-height: 1;
      text-transform: lowercase;
    }

    .answer-slot.space {
      min-width: clamp(20px, 6vw, 34px);
      border-bottom-color: transparent;
    }

    .letter-bank {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(54px, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .letter-button {
      min-height: 54px;
      padding: 6px 8px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, #fff, #fff2bf);
      color: #17223b;
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.18);
      font-size: clamp(1.32rem, 4.6vw, 1.75rem);
      line-height: 1;
    }

    .letter-button.space-tile {
      font-size: clamp(0.98rem, 3vw, 1.18rem);
    }

    .letter-button.used {
      visibility: hidden;
    }

    .spell-tools {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .choice-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .choice-button {
      min-height: 66px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, #fff, #e9f6ff);
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.16);
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      color: var(--ink);
      overflow-wrap: anywhere;
      text-align: center;
    }

    .choice-button.correct {
      background: linear-gradient(180deg, #c9ffd4, #5bdd78);
    }

    .choice-button.wrong {
      background: linear-gradient(180deg, #ffd8d4, #ff7a6f);
    }

    .feedback {
      min-height: 36px;
      margin-top: 12px;
      font-size: clamp(1.1rem, 3.2vw, 1.35rem);
      line-height: 1.25;
      color: #243044;
    }

    .feedback.good {
      color: #126b2e;
    }

    .feedback.bad {
      color: #b32922;
    }

    .finish-card {
      text-align: center;
    }

    .score-big {
      display: inline-grid;
      place-items: center;
      width: min(260px, 74vw);
      aspect-ratio: 1;
      margin: 12px auto;
      border: 5px solid var(--line);
      border-radius: 50%;
      background: radial-gradient(circle at 38% 28%, #fff8b6 0 17%, transparent 18%), var(--coin);
      box-shadow: inset -12px -14px 0 rgba(194, 133, 0, 0.35), 0 10px 0 rgba(0, 0, 0, 0.18);
      color: #5b3300;
      font-size: clamp(2.4rem, 12vw, 4.6rem);
      line-height: 0.95;
    }

    .result-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 16px 0;
      text-align: left;
    }

    .result-item {
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 10px;
      font-size: clamp(1rem, 3vw, 1.16rem);
    }

    .sync-status {
      margin-top: 10px;
      color: var(--muted);
      font-size: clamp(0.98rem, 2.8vw, 1.08rem);
    }

    .teacher-panel {
      display: none;
      margin-top: 14px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: #eef7ff;
      padding: 12px;
    }

    .teacher-panel.visible {
      display: block;
    }

    .teacher-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
    }

    .teacher-grid input {
      min-height: 46px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      padding: 8px 10px;
      background: white;
      font-size: 1rem;
      min-width: 0;
    }

    .teacher-results {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.95rem;
    }

    .teacher-results th,
    .teacher-results td {
      border: 2px solid #2b3544;
      padding: 6px;
      background: white;
      text-align: left;
      vertical-align: top;
    }

    .hidden {
      display: none !important;
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 860px) {
      .topbar {
        align-items: flex-start;
      }

      .mini-status {
        max-width: 48%;
      }

      .start-layout,
      .game-shell {
        grid-template-columns: 1fr;
      }

      .scene {
        min-height: 300px;
      }

      .play-scene {
        min-height: 320px;
      }

      .hero-stage {
        left: 10%;
      }

      .choice-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .app {
        padding-left: 8px;
        padding-right: 8px;
      }

      .topbar {
        display: grid;
      }

      .mini-status {
        max-width: none;
        justify-content: flex-start;
      }

      .brand-badge {
        width: 38px;
        height: 38px;
        font-size: 1.2rem;
      }

      .panel::before {
        height: 16px;
      }

      .panel-body {
        padding: 14px;
      }

      .form-row,
      .option-grid,
      .result-list,
      .teacher-grid {
        grid-template-columns: 1fr;
      }

      .choice-grid {
        grid-template-columns: 1fr;
      }

      .choice-card {
        min-height: 132px;
      }

      .hud {
        grid-template-columns: 1fr;
      }

      .prompt-row {
        grid-template-columns: 1fr;
        justify-items: start;
      }

      .letter-bank {
        grid-template-columns: repeat(auto-fit, minmax(46px, 1fr));
      }

      .letter-button {
        min-height: 48px;
      }

      .spell-tools {
        grid-template-columns: 1fr;
      }

      #screenGame .game-shell {
        gap: 8px;
      }

      #screenGame .play-scene {
        min-height: 188px;
      }

      #screenGame .scene::after {
        height: 38px;
      }

      #screenGame .hero-stage {
        left: 7%;
        bottom: 38px;
        width: 118px;
        height: 130px;
      }

      #screenGame .avatar-figure.play {
        --avatar-size: 78px;
      }

      #screenGame .pipe {
        right: 3%;
        bottom: 38px;
        width: 58px;
        height: 66px;
      }

      #screenGame .pipe::before {
        left: -10px;
        right: -10px;
        top: -19px;
        height: 26px;
      }

      #screenGame .question-block {
        top: 18%;
        right: 12%;
        width: 48px;
        height: 48px;
        font-size: 1.95rem;
      }

      #screenGame .coin-row {
        top: 34%;
        left: 12%;
        gap: 6px;
      }

      #screenGame .coin {
        width: 30px;
        height: 30px;
        border-width: 3px;
      }

      #screenGame .hud {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
        margin-bottom: 8px;
      }

      #screenGame .hud .chip {
        min-height: 32px;
        padding: 4px 8px;
        font-size: 0.94rem;
      }

      #screenGame .question-panel {
        padding: 10px;
      }

      #screenGame .prompt-row {
        grid-template-columns: auto minmax(0, 1fr);
        gap: 8px;
        margin-bottom: 8px;
      }

      #screenGame .prompt-emoji {
        width: 54px;
        height: 54px;
        font-size: 1.8rem;
      }

      #screenGame .prompt-title {
        font-size: 1.55rem;
      }

      #screenGame .prompt-sub {
        font-size: 0.95rem;
      }

      #screenGame .progress-track {
        height: 14px;
        margin-bottom: 8px;
      }

      #screenGame .answer-display {
        min-height: 54px;
        padding: 8px;
        gap: 5px;
        margin: 8px 0;
      }

      #screenGame .answer-slot {
        min-width: 24px;
        height: 34px;
        border-bottom-width: 3px;
        font-size: 1.25rem;
      }

      #screenGame .letter-bank {
        grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
        gap: 6px;
      }

      #screenGame .letter-button {
        min-height: 42px;
        padding: 4px 6px;
        font-size: 1.2rem;
      }

      #screenGame .spell-tools {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }

      #screenGame .spell-tools .btn {
        min-height: 40px;
        padding: 6px;
        font-size: 0.95rem;
      }

      .pipe {
        right: 4%;
        width: 72px;
        height: 82px;
      }

      .question-block {
        right: 12%;
        width: 56px;
        height: 56px;
        font-size: 2.2rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-badge" aria-hidden="true">M</div>
        <h1>Mario Word Quest</h1>
      </div>
      <div class="mini-status" aria-live="polite">
        <span class="chip">7月 英文听写 BIP</span>
        <span class="chip" id="miniSync">Local Ready</span>
        <button class="chip music-toggle" id="musicToggle" type="button" aria-label="Music on" title="Music on">♪</button>
      </div>
    </header>

    <section class="screen active" id="screenName">
      <div class="start-layout">
        <div class="scene" aria-label="Mario style game scene">
          <div class="coin-row" aria-hidden="true"><span class="coin"></span><span class="coin"></span><span class="coin"></span></div>
          <div class="question-block" aria-hidden="true">?</div>
          <div class="pipe" aria-hidden="true"></div>
          <div class="hero-stage" id="startHero"></div>
        </div>
        <div class="panel">
          <div class="panel-body start-copy">
            <h2>输入名字</h2>
            <p>准备好后，选择角色、周次和模式。</p>
            <form class="form-row" id="nameForm">
              <input class="name-input" id="studentName" autocomplete="name" maxlength="28" placeholder="Your name" required>
              <button class="btn primary" type="submit">Start</button>
            </form>
            <div class="teacher-panel" id="teacherPanel">
              <h3 class="section-title">Teacher</h3>
              <div class="teacher-grid">
                <input id="scriptUrlInput" placeholder="Apps Script Web App URL">
                <button class="btn blue" id="saveScriptUrl" type="button">Save</button>
                <button class="btn green" id="retrySync" type="button">Retry</button>
              </div>
              <div class="sync-status" id="teacherStatus"></div>
              <table class="teacher-results" aria-label="Local results">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Week</th>
                    <th>Mode</th>
                    <th>Score</th>
                  </tr>
                </thead>
                <tbody id="teacherResultsBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" id="screenCharacter">
      <div class="panel">
        <div class="panel-body">
          <h2 class="section-title">选择角色</h2>
          <div class="choice-grid" id="characterGrid"></div>
          <div class="screen-actions">
            <button class="btn ghost" type="button" data-back="screenName">Back</button>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" id="screenWeek">
      <div class="panel">
        <div class="panel-body">
          <h2 class="section-title">选择周次</h2>
          <div class="option-grid" id="weekGrid"></div>
          <div class="screen-actions">
            <button class="btn ghost" type="button" data-back="screenCharacter">Back</button>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" id="screenMode">
      <div class="panel">
        <div class="panel-body">
          <h2 class="section-title">选择模式</h2>
          <div class="option-grid">
            <button class="option-button" type="button" data-mode="spelling">
              <strong>Spelling</strong>
              <span>看中文意思，拼出英文单词。</span>
            </button>
            <button class="option-button" type="button" data-mode="listening">
              <strong>Listening</strong>
              <span>听英式发音，选择正确英文。</span>
            </button>
          </div>
          <div class="screen-actions">
            <button class="btn ghost" type="button" data-back="screenWeek">Back</button>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" id="screenGame">
      <div class="game-shell">
        <div class="scene play-scene" aria-label="Game scene">
          <div class="coin-row" aria-hidden="true"><span class="coin"></span><span class="coin"></span><span class="coin"></span></div>
          <div class="question-block" aria-hidden="true">?</div>
          <div class="pipe" aria-hidden="true"></div>
          <div class="hero-stage" id="playHero"></div>
        </div>
        <div>
          <div class="hud">
            <span class="chip" id="hudName">Name</span>
            <span class="chip" id="hudWeek">Week</span>
            <span class="chip" id="hudMode">Mode</span>
            <span class="chip lifes" id="hudLives">♥♥♥♥♥</span>
          </div>
          <div class="question-panel">
            <div class="progress-track" aria-hidden="true"><div class="progress-bar" id="progressBar"></div></div>
            <div id="questionArea"></div>
            <div class="feedback" id="feedback" aria-live="polite"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" id="screenFinish">
      <div class="panel">
        <div class="panel-body finish-card">
          <h2 class="section-title" id="finishTitle">完成！</h2>
          <div class="score-big" id="scoreBig">0</div>
          <p class="prompt-sub" id="finishMessage"></p>
          <div class="result-list" id="resultList"></div>
          <div class="sync-status" id="syncStatus"></div>
          <div class="screen-actions" style="justify-content:center">
            <button class="btn primary" id="playAgain" type="button">Play Again</button>
            <button class="btn green" id="newPlayer" type="button">New Player</button>
          </div>
        </div>
      </div>
    </section>
  </main>

    const state = {

    const musicState = {
      context: null,
      master: null,
      timer: null,
      step: 0,
      enabled: localStorage.getItem(MUSIC_KEY) !== "off",
      started: false,
      ducked: false,
      baseGain: 0.035,
      pattern: [
        523.25, 659.25, 783.99, 1046.5,
        783.99, 659.25, 587.33, 698.46,
        880, 1174.66, 880, 698.46,
        659.25, 783.99, 987.77, 1318.51,
        987.77, 783.99, 698.46, 880,
        1046.5, 1396.91, 1046.5, 880
      ]
    };

    function ensureMusicContext() {
      if (musicState.context) return musicState.context;
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return null;
      const context = new AudioContextClass();
      const master = context.createGain();
      master.gain.value = 0;
      master.connect(context.destination);
      musicState.context = context;
      musicState.master = master;
      return context;
    }

    function setMusicGain(multiplier = 1) {
      if (!musicState.master || !musicState.context) return;
      const target = musicState.enabled ? musicState.baseGain * multiplier : 0;
      musicState.master.gain.setTargetAtTime(target, musicState.context.currentTime, 0.045);
    }

    function playMusicNote(frequency, duration = 0.115) {
      const context = musicState.context;
      if (!context || !musicState.master || !frequency) return;
      const oscillator = context.createOscillator();
      const gain = context.createGain();
      const now = context.currentTime;
      oscillator.type = "square";
      oscillator.frequency.setValueAtTime(frequency, now);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.7, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
      oscillator.connect(gain);
      gain.connect(musicState.master);
      oscillator.start(now);
      oscillator.stop(now + duration + 0.02);
    }

    function playMusicStep() {
      if (!musicState.enabled || !musicState.context) return;
      const note = musicState.pattern[musicState.step % musicState.pattern.length];
      playMusicNote(note);
      if (musicState.step % 4 === 0) playMusicNote(note / 2, 0.18);
      musicState.step += 1;
    }

    function startMusic() {
      if (!musicState.enabled) return;
      const context = ensureMusicContext();
      if (!context) return;
      context.resume?.();
      if (!musicState.timer) {
        setMusicGain(musicState.ducked ? 0.28 : 1);
        playMusicStep();
        musicState.timer = window.setInterval(playMusicStep, 150);
      }
      musicState.started = true;
      updateMusicButton();
    }

    function stopMusic() {
      if (musicState.timer) {
        window.clearInterval(musicState.timer);
        musicState.timer = null;
      }
      musicState.started = false;
      setMusicGain(0);
      updateMusicButton();
    }

    function duckMusic(duration = 1400) {
      if (!musicState.started || !musicState.enabled) return;
      musicState.ducked = true;
      setMusicGain(0.28);
      window.clearTimeout(musicState.duckTimer);
      musicState.duckTimer = window.setTimeout(() => {
        musicState.ducked = false;
        setMusicGain(1);
      }, duration);
    }

    function toggleMusic() {
      musicState.enabled = !musicState.enabled;
      localStorage.setItem(MUSIC_KEY, musicState.enabled ? "on" : "off");
      if (musicState.enabled) {
        startMusic();
      } else {
        stopMusic();
      }
      updateMusicButton();
    }

    function updateMusicButton() {
      if (!dom.musicToggle) return;
      dom.musicToggle.classList.toggle("is-off", !musicState.enabled);
      dom.musicToggle.setAttribute("aria-label", musicState.enabled ? "Music on" : "Music off");
      dom.musicToggle.title = musicState.enabled ? "Music on" : "Music off";
    }

    function avatarMarkup(character, extraClass = "") {
      if (character.image) {
        const wideClass = character.wide ? "wide" : "";
        return `
          <div class="avatar-figure art ${wideClass} ${extraClass}">
            <img class="character-img" src="${character.image}" alt="${safeText(character.name)}">
          </div>
        `;
      }
      return `
        <div class="avatar-figure ${extraClass}" style="--cap-color:${character.cap};--shirt-color:${character.shirt};--overalls-color:${character.overalls}">
          <div class="cap">${character.letter}</div>
          <div class="face"></div>
          <div class="body"></div>
        </div>
      `;
    }

    function showScreen(id) {
      dom.screens.forEach((screen) => screen.classList.toggle("active", screen.id === id));
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function shuffleDifferent(chars) {
      let shuffled = shuffle(chars);
      const original = chars.join("");
      let guard = 0;
      while (chars.length > 1 && shuffled.join("") === original && guard < 12) {
        shuffled = shuffle(chars);
        guard += 1;
      }
      return shuffled;
    }

    function safeText(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function updateHud() {
      dom.hudName.textContent = `👤 ${state.playerName}`;
      dom.hudWeek.textContent = `📘 ${weeks[state.weekId].short}`;
      dom.hudMode.textContent = state.mode === "spelling" ? "✏️ Spelling" : "🔊 Listening";
      dom.hudLives.textContent = "♥".repeat(state.lives) + "♡".repeat(Math.max(0, 5 - state.lives));
      const total = state.order.length || 1;
      dom.progressBar.style.width = `${Math.round((state.currentIndex / total) * 100)}%`;
    }

    function startGame(mode) {
      state.mode = mode;
      state.order = shuffle(weeks[state.weekId].words);
      state.currentIndex = 0;
      state.lives = 5;
      state.score = 0;
      state.correct = 0;
      state.wrong = 0;
      state.answeredWords = new Set();
      state.locked = false;
      dom.playHero.innerHTML = avatarMarkup(state.character, "play");
      showScreen("screenGame");
      renderQuestion();
    }

    function currentWord() {
      return state.order[state.currentIndex];
    }

    function renderQuestion() {
      state.locked = false;
      setFeedback("");
      updateHud();
      const item = currentWord();
      if (!item) {
        finishGame();
        return;
      }
      if (state.mode === "spelling") {
        renderSpelling(item);
      } else {
        renderListening(item);
        setTimeout(() => playBritishAudio(item.word), 180);
      }
      window.__gameDebug = {
        gameId: GAME_ID,
        mode: state.mode,
        weekId: state.weekId,
        target: item.word,
        tileSequence: state.tiles.map((tile) => tile.char).join(""),
        options: [...document.querySelectorAll(".choice-button")].map((button) => button.textContent.trim()),
        lives: state.lives,
        score: state.score
      };
    }

    function renderPrompt(item, title) {
      return `
        <div class="prompt-row">
          <div class="prompt-emoji" aria-hidden="true">${item.emoji}</div>
          <div>
            <h2 class="prompt-title">${title}</h2>
            <p class="prompt-sub">${safeText(item.pinyin)} · No.${item.no}</p>
          </div>
        </div>
      `;
    }

    function renderSpelling(item) {
      state.typed = [];
      state.chosenTiles = [];
      const chars = [...item.word.toLowerCase()];
      const shuffled = shuffleDifferent(chars);
      state.tiles = shuffled.map((char, index) => ({ id: `${index}-${char}-${Math.random().toString(16).slice(2)}`, char, used: false }));
      dom.questionArea.innerHTML = `
        ${renderPrompt(item, safeText(item.meaning))}
        <div class="answer-display" id="answerDisplay" aria-label="Answer"></div>
        <div class="letter-bank" id="letterBank"></div>
        <div class="spell-tools">
          <button class="btn gold" type="button" id="spaceTool">Space</button>
          <button class="btn blue" type="button" id="backTool">Back</button>
          <button class="btn ghost" type="button" id="clearTool">Clear</button>
        </div>
      `;
      document.getElementById("spaceTool").hidden = !item.word.includes(" ");
      renderAnswer();
      renderLetterBank();
      document.getElementById("backTool").addEventListener("click", undoLetter);
      document.getElementById("clearTool").addEventListener("click", clearLetters);
      document.getElementById("spaceTool").addEventListener("click", () => {
        const tile = state.tiles.find((candidate) => candidate.char === " " && !candidate.used);
        if (tile) chooseTile(tile.id);
      });
      window.__gameDebug = {
        gameId: GAME_ID,
        mode: state.mode,
        weekId: state.weekId,
        target: item.word,
        tileSequence: state.tiles.map((tile) => tile.char).join(""),
        lives: state.lives,
        score: state.score
      };
    }

    function renderAnswer() {
      const item = currentWord();
      const chars = [...item.word.toLowerCase()];
      const html = chars.map((char, index) => {
        const typed = state.typed[index] || "";
        if (char === " ") {
          return `<span class="answer-slot space">${typed === " " ? "&nbsp;" : ""}</span>`;
        }
        return `<span class="answer-slot">${safeText(typed)}</span>`;
      }).join("");
      document.getElementById("answerDisplay").innerHTML = html;
    }

    function renderLetterBank() {
      const bank = document.getElementById("letterBank");
      bank.innerHTML = state.tiles.map((tile) => {
        const label = tile.char === " " ? "Space" : safeText(tile.char);
        const cls = tile.char === " " ? "letter-button space-tile" : "letter-button";
        return `<button class="${cls} ${tile.used ? "used" : ""}" type="button" data-tile="${tile.id}" ${tile.used ? "tabindex=\"-1\"" : ""}>${label}</button>`;
      }).join("");
      bank.querySelectorAll("[data-tile]").forEach((button) => {
        button.addEventListener("click", () => chooseTile(button.dataset.tile));
      });
    }

    function chooseTile(tileId) {
      if (state.locked) return;
      const tile = state.tiles.find((candidate) => candidate.id === tileId);
      if (!tile || tile.used) return;
      tile.used = true;
      state.typed.push(tile.char);
      state.chosenTiles.push(tile.id);
      renderAnswer();
      renderLetterBank();
      if (state.typed.length === currentWord().word.length) {
        state.locked = true;
        setTimeout(checkSpellingAnswer, 260);
      }
    }

    function undoLetter() {
      if (state.locked || state.chosenTiles.length === 0) return;
      const tileId = state.chosenTiles.pop();
      const tile = state.tiles.find((candidate) => candidate.id === tileId);
      if (tile) tile.used = false;
      state.typed.pop();
      renderAnswer();
      renderLetterBank();
      setFeedback("");
    }

    function clearLetters() {
      if (state.locked) return;
      state.tiles.forEach((tile) => { tile.used = false; });
      state.typed = [];
      state.chosenTiles = [];
      renderAnswer();
      renderLetterBank();
      setFeedback("");
    }

    function checkSpellingAnswer() {
      const item = currentWord();
      const answer = state.typed.join("");
      if (answer === item.word.toLowerCase()) {
        markCorrect(item);
      } else {
        state.wrong += 1;
        state.lives -= 1;
        updateHud();
        if (state.lives <= 0) {
          setFeedback(`答案是 ${item.word}。`, "bad");
          setTimeout(finishGame, 800);
          return;
        }
        setFeedback("再试一次！生命 -1", "bad");
        setTimeout(() => {
          state.locked = false;
          renderSpelling(item);
          setFeedback("字母已重新洗牌。");
        }, 720);
      }
    }

    function renderListening(item) {
      const options = buildListeningOptions(item);
      dom.questionArea.innerHTML = `
        <div class="prompt-row">
          <div class="prompt-emoji" aria-hidden="true">${item.emoji}</div>
          <div>
            <h2 class="prompt-title">Listen</h2>
            <p class="prompt-sub">No.${item.no} · ${safeText(item.meaning)}</p>
          </div>
        </div>
        <button class="btn blue" id="playAudio" type="button">🔊 Play</button>
        <div class="choice-list">
          ${options.map((option) => `<button class="choice-button" type="button" data-choice="${safeText(option.word)}">${safeText(option.word)}</button>`).join("")}
        </div>
      `;
      document.getElementById("playAudio").addEventListener("click", () => playBritishAudio(item.word));
      dom.questionArea.querySelectorAll("[data-choice]").forEach((button) => {
        button.addEventListener("click", () => chooseListening(button, item));
      });
    }

    function buildListeningOptions(item) {
      const pool = weeks[state.weekId].words.filter((candidate) => candidate.word !== item.word);
      return shuffle([item, ...shuffle(pool).slice(0, 2)]);
    }

    function chooseListening(button, item) {
      if (state.locked || button.disabled) return;
      const choice = button.dataset.choice;
      if (choice === item.word) {
        button.classList.add("correct");
        state.locked = true;
        markCorrect(item);
      } else {
        button.classList.add("wrong");
        button.disabled = true;
        state.wrong += 1;
        state.lives -= 1;
        updateHud();
        if (state.lives <= 0) {
          setFeedback(`答案是 ${item.word}。`, "bad");
          setTimeout(finishGame, 800);
        } else {
          setFeedback("再听一次！生命 -1", "bad");
          playBritishAudio(item.word);
        }
      }
    }

    function markCorrect(item) {
      if (!state.answeredWords.has(`${item.no}-${item.word}`)) {
        state.answeredWords.add(`${item.no}-${item.word}`);
        state.correct += 1;
        state.score += 10;
      }
      state.currentIndex += 1;
      dom.progressBar.style.width = `${Math.round((state.currentIndex / state.order.length) * 100)}%`;
      setFeedback("Correct! +10 coins", "good");
      setTimeout(renderQuestion, 760);
    }

    function playBritishAudio(word) {
      duckMusic();
      const url = `https://dict.youdao.com/dictvoice?type=1&le=eng&audio=${encodeURIComponent(word)}`;
      const audio = new Audio(url);
      const fallback = () => speakBritish(word);
      audio.addEventListener("error", fallback, { once: true });
      audio.addEventListener("ended", () => setMusicGain(1), { once: true });
      const playPromise = audio.play();
      if (playPromise && typeof playPromise.catch === "function") {
        playPromise.catch(fallback);
      }
    }

    function speakBritish(word) {
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(word);
      utterance.lang = "en-GB";
      utterance.rate = 0.82;
      utterance.pitch = 1;
      utterance.onend = () => setMusicGain(1);
      utterance.onerror = () => setMusicGain(1);
      const voices = window.speechSynthesis.getVoices();
      const britishVoice = voices.find((voice) => /en[-_]GB/i.test(voice.lang));
      if (britishVoice) utterance.voice = britishVoice;
      window.speechSynthesis.speak(utterance);
    }

    function finishGame() {
      state.locked = true;
      const maxScore = state.order.length * 10;
      const percent = maxScore ? Math.round((state.score / maxScore) * 100) : 0;
      const result = {
        gameId: GAME_ID,
        gameTitle: GAME_TITLE,
        studentName: state.playerName,
        character: state.character.name,
        week: weeks[state.weekId].label,
        mode: state.mode === "spelling" ? "Spelling" : "Listening",
        score: state.score,
        maxScore,
        percent,
        correct: state.correct,
        wrong: state.wrong,
        livesLeft: state.lives,
        totalQuestions: state.order.length,
        clientTime: new Date().toISOString(),
        userAgent: navigator.userAgent
      };
      saveResult(result);
      dom.finishTitle.textContent = percent >= 80 ? "太棒了！" : percent >= 50 ? "完成了！" : "继续加油！";
      dom.finishMessage.textContent = percent >= 80 ? "你收集了很多金币。" : "再玩一次可以拿更多金币。";
      dom.scoreBig.textContent = `${state.score}`;
      dom.resultList.innerHTML = `
        <div class="result-item"><strong>Name</strong><br>${safeText(result.studentName)}</div>
        <div class="result-item"><strong>Character</strong><br>${safeText(result.character)}</div>
        <div class="result-item"><strong>Week</strong><br>${safeText(result.week)}</div>
        <div class="result-item"><strong>Mode</strong><br>${safeText(result.mode)}</div>
        <div class="result-item"><strong>Correct</strong><br>${result.correct}/${result.totalQuestions}</div>
        <div class="result-item"><strong>Lives</strong><br>${result.livesLeft}</div>
      `;
      showScreen("screenFinish");
      retryPendingResults();
    }

    function readJson(key, fallback) {
      try {
        return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback));
      } catch (error) {
        return fallback;
      }
    }

    function writeJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function saveResult(result) {
      const results = readJson(RESULT_KEY, []);
      results.push(result);
      writeJson(RESULT_KEY, results.slice(-100));
      const pending = readJson(PENDING_KEY, []);
      pending.push(result);
      writeJson(PENDING_KEY, pending);
      renderTeacherResults();
      updateSyncMini();
    }

    function getAppsScriptUrl() {
      return localStorage.getItem(SCRIPT_URL_KEY) || DEFAULT_APPS_SCRIPT_URL;
    }

    async function retryPendingResults() {
      const url = getAppsScriptUrl();
      let pending = readJson(PENDING_KEY, []);
      if (!pending.length) {
        setSyncStatus("All results saved.");
        updateSyncMini();
        return;
      }
      if (!url) {
        setSyncStatus(`Saved locally. Google Sheet URL is not set. Pending: ${pending.length}`);
        updateSyncMini();
        return;
      }
      const stillPending = [];
      for (const result of pending) {
        try {
          await fetch(url, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(result)
          });
        } catch (error) {
          stillPending.push(result);
        }
      }
      writeJson(PENDING_KEY, stillPending);
      const sent = pending.length - stillPending.length;
      setSyncStatus(stillPending.length ? `Sent ${sent}. Pending: ${stillPending.length}` : `Synced to Google Sheet. Sent ${sent}.`);
      updateSyncMini();
    }

    function setSyncStatus(message) {
      dom.syncStatus.textContent = message;
      dom.teacherStatus.textContent = message;
    }

    function updateSyncMini() {
      const pending = readJson(PENDING_KEY, []).length;
      dom.miniSync.textContent = pending ? `Pending ${pending}` : "Local Ready";
    }

    function renderTeacherResults() {
      if (!TEACHER_MODE) return;
      const rows = readJson(RESULT_KEY, []).slice(-8).reverse();
      dom.teacherResultsBody.innerHTML = rows.map((row) => `
        <tr>
          <td>${safeText(row.studentName)}</td>
          <td>${safeText(row.week)}</td>
          <td>${safeText(row.mode)}</td>
          <td>${row.score}/${row.maxScore}</td>
        </tr>
      `).join("") || `<tr><td colspan="4">No local results yet.</td></tr>`;
      dom.teacherStatus.textContent = `Pending: ${readJson(PENDING_KEY, []).length}`;
    }

    dom.nameForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const name = dom.studentName.value.trim();
      if (!name) return;
      state.playerName = name;
      showScreen("screenCharacter");
    });

    dom.characterGrid.addEventListener("click", (event) => {
      const button = event.target.closest("[data-character]");
      if (!button) return;
      state.character = characters.find((character) => character.id === button.dataset.character) || characters[0];
      dom.characterGrid.querySelectorAll(".choice-card").forEach((card) => card.classList.toggle("selected", card === button));
      setTimeout(() => showScreen("screenWeek"), 180);
    });

    dom.weekGrid.addEventListener("click", (event) => {
      const button = event.target.closest("[data-week]");
      if (!button) return;
      state.weekId = button.dataset.week;
      showScreen("screenMode");
    });

    document.querySelectorAll("[data-mode]").forEach((button) => {
      button.addEventListener("click", () => startGame(button.dataset.mode));
    });

    document.querySelectorAll("[data-back]").forEach((button) => {
      button.addEventListener("click", () => showScreen(button.dataset.back));
    });

    dom.playAgain.addEventListener("click", () => showScreen("screenWeek"));
    dom.newPlayer.addEventListener("click", () => {
      dom.studentName.value = "";
      state.playerName = "";
      showScreen("screenName");
      setTimeout(() => dom.studentName.focus(), 120);
    });

    dom.saveScriptUrl.addEventListener("click", () => {
      const value = dom.scriptUrlInput.value.trim();
      if (value) {
        localStorage.setItem(SCRIPT_URL_KEY, value);
      } else {
        localStorage.removeItem(SCRIPT_URL_KEY);
      }
      retryPendingResults();
    });

    dom.retrySync.addEventListener("click", retryPendingResults);
    dom.musicToggle.addEventListener("click", toggleMusic);
    ["pointerdown", "keydown"].forEach((eventName) => {
      document.addEventListener(eventName, startMusic, { once: true, capture: true });
    });
    window.addEventListener("online", retryPendingResults);
    window.addEventListener("beforeunload", () => {
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      stopMusic();
    });
    window.speechSynthesis?.addEventListener?.("voiceschanged", () => {});
    setInterval(retryPendingResults, 30000);

    renderStatic();
  </script>
</body>
</html>
